name: Subsidy Master Change Notify

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'data/subsidy-master.yaml'
  workflow_dispatch:
    inputs:
      base_sha:
        description: '比較元の SHA（空欄で自動：subsidy-master.yaml の1つ前の変更時点）'
        required: false
      pr_number:
        description: 'PR 番号（空欄可）'
        required: false

jobs:
  notify:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post change summary to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          BASE_SHA_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.base_sha || github.event.pull_request.base.sha }}
          PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number || github.event.pull_request.number }}
        run: |
          if [ -z "$BASE_SHA_INPUT" ]; then
            BASE_SHA="$(git log --format="%H" -- data/subsidy-master.yaml | sed -n '2p')"
            if [ -z "$BASE_SHA" ]; then
              echo "ERROR: subsidy-master.yaml の変更履歴が 1 件のみです。base_sha を入力してください。" >&2
              exit 1
            fi
          else
            BASE_SHA="$BASE_SHA_INPUT"
          fi
          export BASE_SHA
          python scripts/change_notify.py
