name: Page Change Check

on:
  schedule:
    # 日曜 JST 09:00 = UTC 00:00
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run（Slack 投稿と state 更新をスキップ）'
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Restore page hashes cache
        uses: actions/cache@v5
        with:
          path: state/page_hashes.json
          key: page-hashes-${{ github.run_number }}
          restore-keys: |
            page-hashes-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check and post
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python scripts/page_change_check.py --dry-run
          else
            python scripts/page_change_check.py
          fi
